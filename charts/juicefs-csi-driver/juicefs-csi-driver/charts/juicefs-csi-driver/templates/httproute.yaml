{{- if .Values.dashboard.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "juicefs-csi.fullname" . }}-dashboard
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "juicefs-csi.labels" . | nindent 4 }}
spec:
  {{- with .Values.dashboard.httpRoute.parentRefs }}
  parentRefs:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  hostnames:
  {{- range .Values.dashboard.httpRoute.hostnames }}
    - {{ . | quote }}
  {{- end }}
  rules:
{{- if .Values.dashboard.httpRoute.extraRules }}
{{- toYaml .Values.dashboard.httpRoute.extraRules | nindent 2 }}
{{- end }}
  - backendRefs:
    - name: juicefs-csi-dashboard
      port: {{ .Values.dashboard.service.port }}
{{- end }}