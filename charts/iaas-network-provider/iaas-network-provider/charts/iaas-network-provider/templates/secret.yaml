{{/*
This template is a placeholder reminder.
In production, the Secret should be created manually or via an external secrets manager.

Example:
  kubectl create secret generic huawei-credentials \
    --from-literal=CLOUD_ACCESS_KEY=xxx \
    --from-literal=CLOUD_SECRET_KEY=xxx
*/}}

{{- if and .Values.tls.enabled .Values.tls.autoGenerate (not .Values.tls.existingSecret) }}
{{- $name := include "iaas-network-provider.fullname" . -}}
{{- $ca := genCA (printf "%s-ca" $name) (int .Values.tls.certValidityDays) -}}
{{- $dns := list
    (printf "%s" $name)
    (printf "%s.%s" $name .Release.Namespace)
    (printf "%s.%s.svc" $name .Release.Namespace)
    (printf "%s.%s.svc.cluster.local" $name .Release.Namespace)
-}}
{{- $cert := genSignedCert $name nil $dns (int .Values.tls.certValidityDays) $ca -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-tls" $name }}
  labels:
    {{- include "iaas-network-provider.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  tls.crt: {{ $cert.Cert | b64enc }}
  tls.key: {{ $cert.Key | b64enc }}
{{- end }}
