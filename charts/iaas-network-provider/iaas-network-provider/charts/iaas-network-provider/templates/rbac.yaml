{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "iaas-network-provider.serviceAccountName" . }}
  labels:
    {{- include "iaas-network-provider.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "iaas-network-provider.fullname" . }}
  labels:
    {{- include "iaas-network-provider.labels" . | nindent 4 }}
rules:
  # Leader election via Lease
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "iaas-network-provider.fullname" . }}
  labels:
    {{- include "iaas-network-provider.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "iaas-network-provider.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "iaas-network-provider.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
# ClusterRole for listing nodes
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "iaas-network-provider.fullname" . }}
  labels:
    {{- include "iaas-network-provider.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["list", "get", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "iaas-network-provider.fullname" . }}
  labels:
    {{- include "iaas-network-provider.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "iaas-network-provider.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "iaas-network-provider.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
