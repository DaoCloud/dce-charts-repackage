{{- if .Values.enabled -}}
{{- if eq "true" (include "gitlab.gatewayApi.route.enabled" .) -}}
{{- include "webservice.datamodel.prepare" $ -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-gitlab
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "gitlab.standardLabels" $ | nindent 4 }}
    {{- include "gitlab.commonLabels" $ | nindent 4 }}
  annotations:
    {{ .Values.gatewayRoute.annotations | toYaml | nindent 4 }}
spec:
  parentRefs:
  {{- include "webservice.gatewayApi.gatewayRefs" . | nindent 4 }}
  hostnames:
  {{- include "webservice.gatewayApi.hostnames" . | nindent 4 }}
  rules:
  {{- range $.Values.deployments }}
  {{ $port := $.Values.service.workhorseExternalPort }}
  {{ $deployment := . }}
      {{- range $deployment.gatewayRoute.rules }}
  - backendRefs:
    - kind: Service
      name: {{ template "webservice.fullname.withSuffix" $deployment }}
      port: {{ $port }}
      weight: 1
    {{ with .name }}
    name: {{ printf "%s-%s" $deployment.name . }}
    {{- end }}
    matches:
      {{- .matches | toYaml | nindent 6 }}
    timeouts:
      {{- .timeouts | toYaml | nindent 6 }}
      {{- end }}
  {{- end }}
{{- end }}
{{- end }}
