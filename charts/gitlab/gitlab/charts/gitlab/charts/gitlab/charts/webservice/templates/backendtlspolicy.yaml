{{- if and .Values.enabled .Values.global.workhorse.tls.enabled -}}
{{-   if eq "true" (include "gitlab.gatewayApi.route.enabled" .) -}}
{{-     include "webservice.datamodel.prepare" $ -}}
{{-     range .Values.deployments }}
{{-       $name := include "webservice.fullname.withSuffix" . }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: {{ $name | quote }}
  namespace: {{ $.Release.Namespace | quote }}
  labels:
    {{- include "gitlab.standardLabels" $ | nindent 4 }}
    {{- include "gitlab.commonLabels" $ | nindent 4 }}
spec:
  targetRefs:
  - group: ""
    kind: Service
    name: {{ $name | quote }}
  validation:
    hostname: {{ .backendTLSPolicy.hostname | default (printf "%s.%s.svc" $name $.Release.Namespace) | quote }}
    caCertificateRefs:
    - group: ""
      kind: Secret
      name: {{ .workhorse.tls.caSecretName | quote }}
{{-     end }}
{{-   end }}
{{- end }}
