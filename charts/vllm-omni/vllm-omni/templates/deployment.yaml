apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vllm-omni.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "vllm-omni.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "vllm-omni.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "vllm-omni.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "vllm-omni.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.hostIPC }}
      hostIPC: true
      {{- end }}
      containers:
        - name: vllm-omni
          image: {{ include "vllm-omni.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command:
            - python
            - "-m"
            - "vllm_omni.entrypoints.openai.api_server"
          args:
            {{- include "vllm-omni.serverArgs" . | nindent 12 }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            {{- if .Values.huggingface.token }}
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "vllm-omni.fullname" . }}-hf-token
                  key: token
            {{- end }}
            {{- if .Values.huggingface.endpoint }}
            - name: HF_ENDPOINT
              value: {{ .Values.huggingface.endpoint | quote }}
            {{- end }}
            {{- if .Values.worldModel.enabled }}
            - name: VLLM_OMNI_WORLD_MODEL_ENABLED
              value: "1"
            - name: VLLM_OMNI_WORLD_MODEL_MAX_SESSIONS
              value: {{ .Values.worldModel.maxSessions | quote }}
            - name: VLLM_OMNI_WORLD_MODEL_SESSION_TIMEOUT
              value: {{ .Values.worldModel.sessionTimeoutSeconds | quote }}
            {{- if .Values.worldModel.websocketEnabled }}
            - name: VLLM_OMNI_WORLD_MODEL_WEBSOCKET_ENABLED
              value: "1"
            {{- end }}
            {{- if .Values.worldModel.kvBuffer.preallocate }}
            - name: VLLM_OMNI_WORLD_MODEL_KV_PREALLOCATE
              value: "1"
            {{- end }}
            {{- end }}
            {{- with .Values.extraEnvVars }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.httpGet.path }}
              port: {{ .Values.livenessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.httpGet.path }}
              port: {{ .Values.readinessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
            {{- if .Values.storage.enabled }}
            - name: model-cache
              mountPath: {{ .Values.storage.mountPath }}
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: {{ .Values.shmSize | quote }}
        {{- if .Values.storage.enabled }}
        - name: model-cache
          {{- if .Values.storage.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ .Values.storage.existingClaim }}
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ include "vllm-omni.fullname" . }}-model-cache
          {{- end }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
