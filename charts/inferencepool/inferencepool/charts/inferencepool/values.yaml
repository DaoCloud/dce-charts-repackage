inferenceExtension:
  replicas: 1
  image:
    registry: k8s.m.daocloud.io
    repository: gateway-api-inference-extension/epp
    tag: v1.5.0
    pullPolicy: Always
  extProcPort: 9002
  failureMode: "FailOpen"
  env: []
  pluginsConfigFile: "default-plugins.yaml"
  # Define additional container ports
  extraContainerPorts: []
  # Define additional service ports
  extraServicePorts: []
  #  extraServicePorts:
  #    - name: http
  #      port: 8081
  #      protocol: TCP
  #      targetPort: 8081

  # This is the plugins configuration file.
  # pluginsCustomConfig:
  #   custom-plugins.yaml: |
  #     apiVersion: inference.networking.x-k8s.io/v1alpha1
  #     kind: EndpointPickerConfig
  #     plugins:
  #     - type: custom-scorer
  #       parameters:
  #         custom-threshold: 64
  #     schedulingProfiles:
  #     - name: default
  #       plugins:
  #       - pluginRef: custom-scorer

  # Example environment variables:
  # env:
  #   ENABLE_EXPERIMENTAL_FEATURE: "true"
  flags:
    # Log verbosity
    v: 1
  affinity: {}
  tolerations: []
  # Resource requests and limits for the EPP container.
  # These defaults are sized for a standard EPP deployment with built-in
  # scheduling plugins. CPU limits are intentionally unset to allow bursting
  # to all available node CPUs during scheduling spikes. Memory limit is set
  # to 16Gi to avoid putting the node under memory pressure in case of a
  # memory leak.
  #
  # These values were validated with scale testing at high QPS, achieving
  # p90 scheduler latency within 100ms.
  #
  # If you add computationally intensive plugins or sidecars (e.g., latency
  # prediction, custom scorers), you may need to increase these values.
  # Use pprof (https://pkg.go.dev/net/http/pprof) to profile your deployment
  # and right-size resources for your workload.
  resources:
    requests:
      cpu: "1"
      memory: 1Gi
    limits:
      cpu: "1"
      memory: 1Gi
  # Sidecar configuration for EPP
  sidecar:
    enabled: false
    image:
      tag: v0.6.0
      pullPolicy: IfNotPresent
      registry: ghcr.m.daocloud.io/llm-d
      repository: llm-d-uds-tokenizer
  # Monitoring configuration for EPP
  monitoring:
    interval: "10s"
    # Prometheus ServiceMonitor will be created when enabled for EPP metrics collection
    prometheus:
      enabled: false
      auth:
        enabled: true
        # Service account token secret for authentication
        secretName: inference-gateway-sa-metrics-reader-secret
      # additional labels for the ServiceMonitor
      extraLabels: {}
  tracing:
    enabled: false
    otelExporterEndpoint: "http://localhost:4317"
    sampling:
      sampler: "parentbased_traceidratio"
      samplerArg: "0.1"
  # Latency Predictor Configuration
  latencyPredictor:
    # common latencyPredictor setting exists in config/charts/inference-extension/values.yaml
    enabled: false
  # Metrics DataSource Configuration
  # These values configure how the EPP scrapes metrics from model server pods.
  metricsDataSource:
    # scheme is the HTTP scheme used to scrape metrics (http or https).
    scheme: "http"
    # path is the URL path on the model server pod that exposes Prometheus metrics.
    path: "/metrics"
    # insecureSkipVerify disables TLS certificate verification when scheme is https.
    insecureSkipVerify: true
  strategy:
    type: Recreate
  ha:
    enableLeaderElection: false
inferencePool:
  targetPorts:
    - number: 8000
  modelServerType: vllm # vllm, sglang, triton-tensorrt-llm, trtllm-serve
  modelServerProtocol: http # http, grpc
  parser: "" # openai-parser, vllmgrpc-parser, passthrough-parser, or empty for auto-selection
  apiVersion: inference.networking.k8s.io/v1
  # modelServers: # REQUIRED
  #   matchLabels:
  #     app: vllm-qwen3-32b
# Options: ["gke", "istio", "none"]
provider:
  name: none
  # GKE-specific configuration.
  # This block is only used if name is "gke".
  gke:
    # Set to true if the cluster is an Autopilot cluster.
    autopilot: false
  # Istio-specific configuration.
  # This block is only used if name is "istio".
  istio:
    destinationRule:
      # Provide a way to override the default calculated host
      host: ""
      # Optional: Enables customization of the traffic policy
      trafficPolicy: {}
      # connectionPool:
      #   http:
      #     maxRequestsPerConnection: 256000
# experimentalHttpRoute section is used to deploy httproute as part of the epp helm chart.
# this section is temporary and should be extracted to a separate chart.
experimentalHttpRoute:
  enabled: false # a flag to indicate whether to create the httproute as part of the chart or not.
  inferenceGatewayName: inference-gateway
  # HTTPRoute request timeout. Defaults to "300s". Unused when provider.name is gke.
  requestTimeout: "300s"
# Optional: Define InferenceObjective(s) for this InferencePool.
# Each InferenceObjective associates a name and priority with the InferencePool
# created in the chart release.
# Users reference these objectives by name in their request headers.
# This is only used for when InferenceObjectives are known ahead of time,
# they can still be created out of band of the chart release as needed.
inferenceObjectives: []
#   - name: high-priority
#     priority: 5
#   - name: low-priority
#     priority: 1
