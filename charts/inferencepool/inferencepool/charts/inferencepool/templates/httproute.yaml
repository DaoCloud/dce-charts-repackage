{{- if .Values.experimentalHttpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: {{ include "gateway-api-inference-extension.gateway.fullname" . }}
  rules:
  - backendRefs:
    - group: inference.networking.k8s.io
      kind: InferencePool
      name: {{ .Release.Name }}
    matches:
    - path:
        type: PathPrefix
        value: /
      {{- if .Values.experimentalHttpRoute.baseModel }}
      headers:
        - type: Exact
          name: X-Gateway-Base-Model-Name
          value: {{ .Values.experimentalHttpRoute.baseModel }}
      {{- end }}
    {{- if ne (lower .Values.provider.name) "gke" }}
    timeouts:
      request: {{ .Values.experimentalHttpRoute.requestTimeout }}
    {{- end }}
{{- end }}
