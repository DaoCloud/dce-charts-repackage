{{- define "inference-extension.config" -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gateway-api-inference-extension.name" . }}
  namespace: {{ .Release.Namespace }}
data:
  default-plugins.yaml: |
    {{- $modelServerProtocol := "http" }}
    {{- $modelServerType := "vllm" }}
    {{- if and .Values.inferenceExtension.endpointsServer (not .Values.inferenceExtension.endpointsServer.createInferencePool) -}}
      {{- $modelServerProtocol = .Values.inferenceExtension.endpointsServer.modelServerProtocol | default "http" }}
      {{- $modelServerType = .Values.inferenceExtension.endpointsServer.modelServerType | default "vllm" }}
    {{- else if .Values.inferencePool -}}
      {{- $modelServerProtocol = .Values.inferencePool.modelServerProtocol | default "http" }}
      {{- $modelServerType = .Values.inferencePool.modelServerType | default "vllm" }}
    {{- end }}
    {{- $parserType := "" }}
    {{- if and (eq (lower $modelServerType) "vllm") (eq (lower $modelServerProtocol) "grpc") }}
      {{- $parserType = "vllmgrpc-parser" }}
    {{- else if and .Values.inferencePool .Values.inferencePool.parser }}
      {{- $parserType = .Values.inferencePool.parser }}
    {{- end }}
    apiVersion: inference.networking.x-k8s.io/v1alpha1
    kind: EndpointPickerConfig
    plugins:
    - type: queue-scorer
    - type: kv-cache-utilization-scorer
    - type: prefix-cache-scorer
    - type: metrics-data-source
      parameters:
        scheme: {{ .Values.inferenceExtension.metricsDataSource.scheme | default "http" | quote }}
        path: {{ .Values.inferenceExtension.metricsDataSource.path | default "/metrics" | quote }}
        insecureSkipVerify: {{ .Values.inferenceExtension.metricsDataSource.insecureSkipVerify | default true }}
    - type: core-metrics-extractor
      {{- $modelServerType := .Values.inferencePool.modelServerType | default "vllm" }}
      {{- if and .Values.inferenceExtension.endpointsServer (not .Values.inferenceExtension.endpointsServer.createInferencePool) }}
        {{- $modelServerType = .Values.inferenceExtension.endpointsServer.modelServerType | default "vllm" }}
      {{- end }}
      {{- if ne $modelServerType "vllm" }}
      parameters:
        defaultEngine: {{ $modelServerType | quote }}
      {{- end }}
    {{- if $parserType }}
    - type: {{ $parserType }}
    {{- end }}
    {{- if .Values.inferenceExtension.latencyPredictor.enabled }}
    - type: predicted-latency-producer
    # Two-gate prefix cache affinity: strict (0.99) runs before the SLO tier
    # filter to prefer near-exact cache matches across all endpoints; loose
    # (0.80) runs after the tier filter to prefer partial matches within the
    # SLO-qualified tier.
    - name: strict-affinity-filter
      type: prefix-cache-affinity-filter
      parameters:
        affinityThreshold: 0.99
    - name: loose-affinity-filter
      type: prefix-cache-affinity-filter
      parameters:
        affinityThreshold: 0.80
    - type: latency-scorer
    - type: weighted-random-picker
    - type: slo-headroom-tier-filter
    - type: latency-slo-admitter
    {{- end }}
    schedulingProfiles:
    {{- if .Values.inferenceExtension.latencyPredictor.enabled }}
    - name: default
      plugins:
      - pluginRef: predicted-latency-producer
      - pluginRef: strict-affinity-filter
      - pluginRef: slo-headroom-tier-filter
      - pluginRef: loose-affinity-filter
      - pluginRef: latency-scorer
      - pluginRef: weighted-random-picker
    {{- else }}
    - name: default
      plugins:
      - pluginRef: queue-scorer
        weight: 2
      - pluginRef: kv-cache-utilization-scorer
        weight: 2
      - pluginRef: prefix-cache-scorer
        weight: 3
    {{- end }}
    {{- if $parserType }}
    parser:
      pluginRef: {{ $parserType }}
    {{- end }}
  {{- if (hasKey .Values.inferenceExtension "pluginsCustomConfig") }}
  {{- .Values.inferenceExtension.pluginsCustomConfig | toYaml | nindent 2 }}
  {{- end }}
  
---
{{- if and .Values.inferenceExtension.sidecar.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.inferenceExtension.sidecar.configMap.name }}
  namespace: {{ .Release.Namespace }}
data:
  {{- .Values.inferenceExtension.sidecar.configMap.data | toYaml | nindent 2 }}
{{- end }}
---
{{- if .Values.inferenceExtension.latencyPredictor.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gateway-api-inference-extension.name" . }}-latency-predictor-training
  namespace: {{ .Release.Namespace }}
data:
  {{- range $key, $value := .Values.inferenceExtension.latencyPredictor.trainingServer.config }}
  {{ $key }}: {{ $value | quote }}
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gateway-api-inference-extension.name" . }}-latency-predictor-prediction
  namespace: {{ .Release.Namespace }}
data:
  {{- range $key, $value := .Values.inferenceExtension.latencyPredictor.predictionServers.config }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
---
{{- end -}}
