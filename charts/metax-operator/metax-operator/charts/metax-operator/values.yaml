# Default values for metax-operator.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

registry: release.daocloud.io
pullPolicy: IfNotPresent
kind:
  enabled: false
log:
  dir: /var/log/metax
  level: info
  format: json
  rotationTime: 1w
  maxAge: 26w
controller:
  replicaCount: 1
  name: operator-controller
  nameOverride: ""
  fullnameOverride: ""
  imagePullSecrets: []
  podAnnotations: {}
  tolerations:
    - key: "node-role.kubernetes.io/master"
      operator: "Equal"
      value: ""
      effect: "NoSchedule"
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Equal"
      value: ""
      effect: "NoSchedule"
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 1
          preference:
            matchExpressions:
              - key: "node-role.kubernetes.io/master"
                operator: In
                values: [""]
        - weight: 1
          preference:
            matchExpressions:
              - key: "node-role.kubernetes.io/control-plane"
                operator: In
                values: [""]
  podSecurityContext: {}
  securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  nodeSelector: {}
  image:
    name: metax/operator-controller
    version: 0.15.2
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: "metax-operator"
# label generator config
gpuLabel:
  log:
  image:
    name: metax/gpu-label
    version: 0.15.2
# kernel module driver config
driver:
  deployPolicy: "PreferCloud"
  # fw upgrade
  fwUpgradePolicy: "Never"
  fwEnableVirt: false
  deviceAsRootGroup: false
  upgradePolicy:
    enableRollout: false
    upgradeSteps:
      - replicas: 1
        pauseDuration: 30000
      - replicas: 100%
    pause: false
    maxParallel: 100%
    maxUnavailable: 0%
    maxFailureThreshold: 5
    Fallback: pause
  # payload contains the KMD package
  payload:
    name: "metax/driver-image"
    version: "3.2.1.12-amd64"
  # legacy fields (used when cmInit is not provided)
  vfnumsConfig:
    nodes:
      sample-node:
        vfnum: 4
      sample-node2:
        vfnum: 2
  moduleParams:
  nodeModuleParams:
  log:
  # please modify vfio config before using
  # vfio config only applies to v1; for v2 configure driverConfig directly
  vfioConfig:
    - nodeName: worker-node1
      gpus: ""
  driverConfig:
  # cmInit: ConfigMap initialization config (passthrough to ConfigMap.data)
  # Example:
  #
  #   cmInit:
  #     config:                          # -> driver-config ConfigMap
  #       version: "v2"
  #       nodes-config: |
  #         - nodeName: worker-1
  #           vfNum: 4
  #       module-params: |
  #         gpu_model: 1
  #    # vfio config only applies to v1; for v2 configure driverConfig directly
  #     vfio:                            # -> metax-vfio-config ConfigMap
  #       vfio: |
  #         - nodeName: worker-1
  #           gpus: "0,1"
  cmInit: {}
  image:
    name: metax/driver-manager
    version: 0.15.2
# maca config
maca:
  # payload contains the UMD package
  payload:
    # Full reference to the container images.
    # Supported formats:
    # - Tag-based: <image-name>:<tag>
    # - Digest-based: <image-name>@sha256:<hash>
    images:
      name: metax/maca-native
      version: 3.2.1.4-ubuntu20.04-amd64
  # legacy fields (used when cmInit is not provided)
  cleanupConfig:
    threshold: 5
    #policy: Never/OlderVersionFirst/OlderTimestampFirst
    cleanupPolicy: Never
  log:
  # cmInit is ConfigMap initialization config (passthrough to ConfigMap.data)
  # Example
  #
  #   cmInit:
  #     config:                          # -> maca-config ConfigMap
  #       cleanup: |
  #         threshold: 5
  #         cleanupPolicy: OlderVersionFirst
  cmInit: {}
  image:
    name: metax/driver-manager
    version: 0.15.2
# container runtime config
runtime:
  log:
  config:
    cdiMode:
  image:
    name: metax/container-runtime
    version: 0.15.2
# device plugin config
gpuDevice:
  healthyInterval: 5
  connectDetectPeriod: 0s
  # legacy field (used when cmInit is not provided)
  sGPUHybridMode: false
  log:
  config:
    mode: native
    sgpuHybrid: null
    shareNums: 4
    deviceAllocationStrategy: native
  # cmInit: ConfigMap initialization config (passthrough to ConfigMap.data)
  # Example:
  #
  #   cmInit:
  #     config:                          # -> metax-device-config ConfigMap
  #       version: "v1"
  #       cluster-config: |
  #         mode: "native"
  #       nodes-config: |
  #         - nodeName: worker-1
  #           mode: "sgpu"
  cmInit: {}
  image:
    name: metax/gpu-device
    version: 0.15.2
# data exporter config
dataExporter:
  deploy: false
  service:
    type: ClusterIP
    port: 30445
  image:
    name: metax/mx-exporter
    version: 0.15.2
topoDiscovery:
  deploy: false
  # config/dragonfly/switchbox
  mode: "config"
  dragonfly:
    nodeNumber: 2
    enableTraining: false
  switchbox:
    clusterManagerAddress:
    clusterManagerUser:
    clusterManagerPassword:
    clusterManagerPollTopoPeriod: 30
    clusterManagerPollEventPeriod: 10
    # internal dragonfly
    nodeNumber: 2
    enableTraining: false
  rpcServerPort: 10001
  master:
    serverPort: 9001
    log:
    env:
    podTemplateSpec:
      spec:
        tolerations:
          - key: "node-role.kubernetes.io/master"
            operator: "Equal"
            value: ""
            effect: "NoSchedule"
          - key: "node-role.kubernetes.io/control-plane"
            operator: "Equal"
            value: ""
            effect: "NoSchedule"
        affinity:
          nodeAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 1
                preference:
                  matchExpressions:
                    - key: "node-role.kubernetes.io/master"
                      operator: In
                      values: [""]
              - weight: 1
                preference:
                  matchExpressions:
                    - key: "node-role.kubernetes.io/control-plane"
                      operator: In
                      values: [""]
    image:
      name: metax/topo-master
      version: 0.15.2
  worker:
    metricsPort: 9002
    log:
    image:
      name: metax/topo-worker
      version: 0.15.2
gpuScheduler:
  deploy: false
  version: v1
  # v1 (extender mode)
  kubeScheduler:
    image:
      registry: "release.daocloud.io"
      name: metax/kube-scheduler
      version: v1.28.2
  gpuAware:
    image:
      name: metax/gpu-aware
      version: 0.15.2
  # v2 (framework mode)
  scheduler:
    image:
    metricsPort: 31993
  cmInit: {}
openshift:
  deploy: null
cluster:
  type:
  version:
