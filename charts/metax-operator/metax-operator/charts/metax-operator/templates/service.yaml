apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: service
    app.kubernetes.io/instance: controller-manager-metrics-service
  name: controller-manager-metrics-service
  namespace: {{ .Release.Namespace }}
spec:
  ports:
  - name: https
    port: 8443
    protocol: TCP
    targetPort: https
  selector:
    app.kubernetes.io/name: metax-operator
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: service
    app.kubernetes.io/instance: upgrade-webhook-service
  name: upgrade-webhook-service
  namespace: {{ .Release.Namespace }}
spec:
  ports:
    - port: 443
      protocol: TCP
      targetPort: 9443
  selector:
    app.kubernetes.io/name: metax-operator
---
{{- if eq .Values.gpuScheduler.version "v2" }}
apiVersion: v1
kind: Service
metadata:
  name: metax-gpu-scheduler-metrics
  namespace: {{ .Release.Namespace }}
spec:
  selector:
      app: metax-gpu-scheduler
  type: NodePort
  ports:
    - port: 10259
      targetPort: 10259
      nodePort: {{ .Values.gpuScheduler.scheduler.metricsPort }}
      protocol: TCP
{{- end }}