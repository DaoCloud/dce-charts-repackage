{{- if (include "openshiftEnabled" .) }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "metax-operator.fullname" . }}-scc-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "metax-operator.fullname" . }}-scc-role
subjects:
- kind: ServiceAccount
  name: metax-container-runtime
  namespace: {{ .Release.Namespace }}
- kind: ServiceAccount
  name: metax-data-exporter
  namespace: {{ .Release.Namespace }}
- kind: ServiceAccount
  name: metax-driver
  namespace: {{ .Release.Namespace }}
- kind: ServiceAccount
  name: metax-gpu-device
  namespace: {{ .Release.Namespace }}
- kind: ServiceAccount
  name: metax-gpu-label
  namespace: {{ .Release.Namespace }}
- kind: ServiceAccount
  name: metax-topo-worker
  namespace: {{ .Release.Namespace }}
{{- end }}
