apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: luscsi-csi-resizer-binding
subjects:
  - kind: ServiceAccount
    name: {{ .Values.luscsi.csiController.serviceAccount.name | default "csi-luscsi-controller-sa" }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: luscsi-external-resizer-role
  apiGroup: rbac.authorization.k8s.io

