# 追加的values配置 - DaoCloud定制化增强

# 添加 Insight 标签支持
labels:
  "operator.insight.io/managed-by": "insight"

# 资源限制优化
csiController:
  provisioner:
    resources:
      limits:
        cpu: "200m"
        memory: "256Mi"
      requests:
        cpu: "100m"
        memory: "128Mi"
  resizer:
    resources:
      limits:
        cpu: "200m"
        memory: "256Mi"
      requests:
        cpu: "100m"
        memory: "128Mi"

luscsiNode:
  nodeDriverRegistrar:
    resources:
      limits:
        cpu: "100m"
        memory: "128Mi"
      requests:
        cpu: "50m"
        memory: "64Mi"
  luscsi:
    resources:
      limits:
        cpu: "500m"
        memory: "512Mi"
      requests:
        cpu: "250m"
        memory: "256Mi"

# 增加nodeSelector支持（可选）
nodeSelector: {}

# 增加容忍度支持（可选）
tolerations: []

