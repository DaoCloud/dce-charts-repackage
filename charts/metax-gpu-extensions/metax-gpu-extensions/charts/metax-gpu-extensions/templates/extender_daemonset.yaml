{{- if .Values.deployExtenderGPUAware }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gpu-aware-ds
  namespace: {{ include "GPUExt.namespace" . }}
  labels:
    {{- include "GPUExt.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "GPUExt.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app: gpu-aware-ds
        {{- include "GPUExt.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ .Values.gpuAware.name }}
      initContainers:
      - name: init-log-dir
        image: "{{ .Values.gpuAware.image.registry }}/{{ .Values.gpuAware.image.repository }}:{{ .Values.gpuAware.image.tag }}"
        securityContext:
          runAsUser: 0  
        command: ["/bin/sh", "-c"]
        args:
          - |
            chmod 775 /var/log/metax
            chmod 775 /etc/metax
            chmod 775 /etc/metax/extender.yaml || true
        volumeMounts:
        {{- with .Values.gpuAware.resources }}
        resources:
          {{- toYaml . | nindent 12 }}
        {{- end }}
        - name: log
          mountPath: /var/log/metax
        - name: extender-config
          mountPath: /etc/metax
      - name: gpu-aware-init
        image: "{{ .Values.gpuAware.image.registry }}/{{ .Values.gpuAware.image.repository }}:{{ .Values.gpuAware.image.tag }}"
        command: ['/gpu-aware']
        args: ["init"]
        volumeMounts:
        - mountPath: /etc/metax
          name: extender-config
      containers:
      - name: gpu-aware
        image: "{{ .Values.gpuAware.image.registry }}/{{ .Values.gpuAware.image.repository }}:{{ .Values.gpuAware.image.tag }}"
        imagePullPolicy: {{ default .Values.pullPolicy ((.Values.gpuDevice).image).pullPolicy }}
        command: ['/gpu-aware']
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: gpu-aware-weight
          mountPath: /etc/score-weight
        - name: log
          mountPath: /var/log/metax
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      volumes:
      - name: gpu-aware-weight
        configMap:
          name: gpu-aware-weight
      - name: extender-config
        hostPath:
          path: /etc/metax/
          type: DirectoryOrCreate
      - name: log
        hostPath:
          path: {{ .Values.log.dir }}
          type: DirectoryOrCreate
{{- end }}