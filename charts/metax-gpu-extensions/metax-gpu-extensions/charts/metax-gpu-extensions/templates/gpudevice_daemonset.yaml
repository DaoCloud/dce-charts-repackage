apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gpu-device
  namespace: {{ include "GPUExt.namespace" . }}
  labels:
    {{- include "GPUExt.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "GPUExt.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app: gpu-device
        {{- include "GPUExt.selectorLabels" . | nindent 8 }}
    spec:
      nodeSelector:
        {{ .Values.domain }}/gpu.installed: "true"
      serviceAccountName: {{ include "GPUExt.serviceAccountName" . }}
      serviceAccount:     {{ include "GPUExt.serviceAccountName" . }}
      priorityClassName:  system-node-critical
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: gpu-device-plugin
        securityContext:
          privileged: true
        image: "{{ .Values.gpuDevice.image.registry }}/{{ .Values.gpuDevice.image.repository }}:{{ .Values.gpuDevice.image.tag }}"
        imagePullPolicy: {{ default .Values.pullPolicy ((.Values.gpuDevice).image).pullPolicy }}
        {{- with .Values.gpuDevice.resources }}
        resources:
          {{- toYaml . | nindent 12 }}
        {{- end }}
        command: ['/k8s-device-plugin']
        args:
        - --healthy-interval={{ .Values.gpuDevice.healthyInterval }}
        - --connect-detect-period={{ .Values.gpuDevice.connectDetectPeriod }}
        - --log-file=/var/log/gpu-device.log
        - --log-level={{ default .Values.log.level ((.Values.gpuDevice).log).level }}
        - --log-format={{ default .Values.log.format ((.Values.gpuDevice).log).format }}
        - --log-rotation={{ default .Values.log.rotationTime ((.Values.gpuDevice).log).rotationTime }}
        - --log-max-age={{ default .Values.log.maxAge ((.Values.gpuDevice).log).maxAge }}
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        volumeMounts:
          - name: device-plugin-sock
            mountPath: /var/lib/kubelet/device-plugins
          - name: device-plugin-log
            mountPath: /var/log
          - name: pod-resources-sock
            mountPath: /var/lib/kubelet/pod-resources
          - name: run
            mountPath: /run/k8s-device-plugin
          - name: vendor-config
            mountPath: /etc/gpu-vendor.yaml
            subPath: gpu-vendor.yaml
          - name: host-dev
            mountPath: /host-dev
          - name: cdi
            mountPath: /var/run/cdi
          - name: device-config
            mountPath: /config
            readOnly: true
          - name: host-sys
            mountPath: /sys
      volumes:
      - name: device-plugin-sock
        hostPath:
          path: /var/lib/kubelet/device-plugins
      - name: device-plugin-log
        hostPath:
          path: {{ default .Values.log.dir ((.Values.gpuDevice).log).dir }}
          type: DirectoryOrCreate
      - name: run
        hostPath:
          path: {{ .Values.runDir }}
      - name: pod-resources-sock
        hostPath:
          path: /var/lib/kubelet/pod-resources
      - name: host-dev
        hostPath:
          path: /dev
      - name: cdi
        hostPath:
          path: /var/run/cdi
          type: DirectoryOrCreate
      - name: vendor-config
        configMap:
          name: vendor-config
      - name: device-config
        configMap:
          name: device-config
      - name: host-sys
        hostPath:
          path: /sys
