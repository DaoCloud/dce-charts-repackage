{{- if and .Values.gateway.enabled .Values.gateway.tls.referenceGrant.enabled }}
{{- $secretName := .Values.gateway.tls.referenceGrant.secretName | default .Values.gateway.tls.servingCertSecretName }}
{{- $secretNamespace := .Values.gateway.tls.referenceGrant.secretNamespace }}
{{- range $listener := .Values.gateway.listeners }}
  {{- if and $listener.tls $listener.tls.certificateRefs }}
    {{- range $certRef := $listener.tls.certificateRefs }}
      {{- if not $secretName }}
        {{- $secretName = $certRef.name }}
      {{- end }}
      {{- if and (not $secretNamespace) $certRef.namespace }}
        {{- $secretNamespace = $certRef.namespace }}
      {{- end }}
    {{- end }}
  {{- end }}
{{- end }}
{{- $secretName = $secretName | default "data-science-gateway-service-tls" }}
{{- $secretNamespace = $secretNamespace | default "openshift-ingress" }}
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: {{ .Values.gateway.tls.referenceGrant.name | default (printf "%s-tls" (include "gateway.fullname" .)) }}
  namespace: {{ $secretNamespace }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
    app.kubernetes.io/gateway: {{ include "gateway.fullname" . }}
    app.kubernetes.io/component: inference-gateway
    {{- if .Values.commonLabels }}
    {{- include "common.tplvalues.render" ( dict "value" .Values.commonLabels "context" $ ) | nindent 4 }}
    {{- end }}
  annotations:
    {{- if .Values.commonAnnotations }}
    {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
    {{- end }}
spec:
  from:
  - group: gateway.networking.k8s.io
    kind: Gateway
    namespace: {{ .Release.Namespace }}
  to:
  - group: ""
    kind: Secret
    name: {{ $secretName }}
  {{- if $secretNamespace }}
    namespace: {{ $secretNamespace }}
  {{- end }}
{{- end }}
