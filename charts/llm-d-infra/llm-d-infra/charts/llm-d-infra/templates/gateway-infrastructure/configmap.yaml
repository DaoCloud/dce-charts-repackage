{{ if and .Values.gateway.enabled (or (eq .Values.gateway.gatewayClassName "istio") (eq .Values.gateway.gatewayClassName "data-science-gateway-class")) .Values.gateway.gatewayParameters.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gateway.fullname" . }}
  labels: {{ include "common.labels.standard" . | nindent 4 }}
    app.kubernetes.io/gateway: {{ include "gateway.fullname" . }}
    app.kubernetes.io/component: inference-gateway
    {{- if .Values.commonLabels }}
    {{- include "common.tplvalues.render" ( dict "value" .Values.commonLabels "context" $ ) | nindent 4 }}
    {{- end }}
  annotations:
    {{- if .Values.commonAnnotations }}
    {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
    {{- end }}
    {{- if .Values.gateway.annotations }}
    {{- include "common.tplvalues.render" ( dict "value" .Values.gateway.annotations "context" $) | nindent 4 }}
    {{- end }}
data:
  {{- if eq .Values.gateway.gatewayClassName "istio" }}
  deployment: |
    spec:
      template:
        spec:
          containers:
          - name: istio-proxy
            args:
              - proxy
              - router
              - --domain
              - $(POD_NAMESPACE).svc.cluster.local
              - --proxyLogLevel
              - {{ .Values.gateway.gatewayParameters.logLevel }}
              - --proxyComponentLogLevel
              - misc:{{ .Values.gateway.gatewayParameters.logLevel }}
              - --log_output_level
              - default:{{ .Values.gateway.gatewayParameters.logLevel }}
            {{- if .Values.gateway.gatewayParameters.resources }}
            resources: {{ .Values.gateway.gatewayParameters.resources | toYaml | nindent 14 }}
            {{- end}}
  {{- end }}
  service: |
    {{- if eq .Values.gateway.gatewayClassName "data-science-gateway-class" }}
    metadata:
      annotations:
        service.beta.openshift.io/serving-cert-secret-name: {{ .Values.gateway.tls.servingCertSecretName | default "data-science-gateway-service-tls" | quote }}
    {{- end }}
    spec:
      type: {{ .Values.gateway.service.type | quote }}
      {{- if .Values.gateway.service.ports }}
      ports: {{ .Values.gateway.service.ports | toYaml | nindent 8 }}
      {{- end }}
      {{- if .Values.gateway.service.loadBalancerClass }}
      loadBalancerClass: {{ .Values.gateway.service.loadBalancerClass | quote }}
      {{- end }}
{{- end}}
